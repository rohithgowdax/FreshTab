<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshTab</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <main class="popup">
    <h1>FreshTab</h1>

    <section class="panel">
      <label class="toggle">
        <input id="closeCleanupToggle" type="checkbox">
        <span>Clear selected tabs on close</span>
      </label>

      <label class="toggle">
        <input id="refreshCleanupToggle" type="checkbox">
        <span>Enable fresh reload shortcut</span>
      </label>



      <button id="freshReloadButton" class="primaryButton" type="button">Fresh reload selected tabs</button>

      <p id="statusText" class="status"></p>

    </section>

    <section class="panel" id="tabsPanel">
      <div class="tabsHeader">
        <h2>Choose tabs</h2>
        <div class="actions">
          <button id="selectActiveButton" type="button">Active</button>
          <button id="selectAllButton" type="button">All</button>
          <button id="clearAllButton" type="button">Clear</button>
        </div>
      </div>
      <div id="tabList" class="tabList"></div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>

</html>
